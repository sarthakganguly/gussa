services:
  app:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5174:5174"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: sh -c "echo 'Starting npm install...' && npm install --fetch-retries=5 --fetch-retry-mintimeout=20000 && echo 'npm install complete. Starting Vite...' && npm run dev -- --host --port 5174"
    environment:
      - NODE_ENV=development
